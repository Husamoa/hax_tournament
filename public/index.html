<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b7a3b" />
  <title>Pitole — turnieje HaxBall 2v2</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%23fff' stroke='%230b7a3b' stroke-width='3'/%3E%3Cpath d='M16 8l6 4-2 7h-8l-2-7z' fill='%230b7a3b'/%3E%3C/svg%3E" />
</head>
<body>
  <!-- Brama logowania -->
  <div id="login" class="login hidden">
    <form id="login-form" class="login-card">
      <div class="login-logo">⚽</div>
      <h1>Pitole</h1>
      <p class="muted">Turnieje HaxBall 2v2</p>
      <input id="login-pass" type="password" placeholder="Hasło ekipy" autocomplete="current-password" />
      <button type="submit" class="btn btn-primary">Zaloguj</button>
      <div id="login-error" class="error"></div>
      <p class="app-version js-version muted"></p>
    </form>
  </div>

  <!-- Aplikacja -->
  <div id="app" class="app hidden">
    <header class="topbar">
      <div class="brand">⚽ Pitole <span class="app-version js-version"></span></div>
      <nav class="tabs">
        <button class="tab" data-tab="turniej">Turniej</button>
        <button class="tab" data-tab="statystyki">Statystyki</button>
        <button class="tab" data-tab="historia">Historia</button>
        <button class="tab" data-tab="gracze">Gracze</button>
      </nav>
      <button id="logout-btn" class="link-btn" title="Wyloguj">Wyloguj</button>
    </header>

    <main id="view" class="view"><!-- render dynamiczny --></main>

    <div id="toast" class="toast hidden"></div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
