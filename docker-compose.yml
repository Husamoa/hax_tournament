# Pitole — development lokalny: `docker compose up` i wszystko wstaje.
#
#   aplikacja:  http://localhost:8090   (port zmienisz zmienną APP_PORT)
#   hasło dev:  pitole
#   baza:       SQLite — DOKŁADNIE jak na produkcji OVH (PHP 8.2 + Apache + SQLite,
#               bez osobnego serwera bazy). Plik bazy żyje w wolumenie `dbdata`;
#               schemat (schema.sqlite.sql) importuje się sam przy pierwszym starcie.
#               Reset bazy: docker compose down -v
#
# Kod jest montowany z hosta — edytujesz pliki, odświeżasz przeglądarkę,
# bez przebudowy obrazu.

services:
  app:
    build: .
    ports:
      - "${APP_PORT:-8090}:80"
    volumes:
      # żywy kod z hosta. API montowane POZA DocumentRoot (/var/www/api,
      # wystawione pod /api Aliasem w obrazie) — mounty się nie zagnieżdżają,
      # więc Docker nie tworzy plików-stubów na hoście w public/.
      - ./public:/var/www/html
      - ./api/index.php:/var/www/api/index.php:ro
      - ./api/db.php:/var/www/api/db.php:ro
      # config developerski (SQLite w /var/www/data, hasło dev "pitole")
      - ./docker/config.docker.php:/var/www/api/config.php:ro
      # schemat + skrypt inicjujący bazę (odpalany z command przy starcie)
      - ./schema.sqlite.sql:/schema.sqlite.sql:ro
      - ./docker/init-db.php:/var/www/init-db.php:ro
      # narzędzia dev (np. seed): docker compose exec -u www-data app php /var/www/tools/seed-dev.php
      - ./tools:/var/www/tools:ro
      # trwały katalog na plik bazy SQLite (reset: docker compose down -v)
      - dbdata:/var/www/data
    # start: utwórz bazę (gdy brak), daj Apache'owi prawo zapisu do katalogu bazy, odpal serwer
    command: ["sh", "-c", "php /var/www/init-db.php && chown -R www-data:www-data /var/www/data && exec apache2-foreground"]

volumes:
  dbdata:
